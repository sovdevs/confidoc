[project]
name = "pdf-to-markdown"
version = "0.1.0"
description = "Batch PDF to Markdown pipeline (vendored — docling excluded for cloud deployment)"
requires-python = ">=3.12"
dependencies = [
    "aiofiles>=25.1.0",
    "pymupdf>=1.27.2.2",
    "python-dotenv>=1.2.2",
    "pyyaml>=6.0.3",
]

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/pdf_to_markdown"]
