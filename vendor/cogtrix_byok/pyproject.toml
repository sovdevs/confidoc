[project]
name = "cogtrix-byok"
version = "0.1.0"
description = "Provider-neutral BYOK LLM abstraction layer"
requires-python = ">=3.10"
dependencies = [
    "openai>=1.12.0",
    "pydantic>=2.6.0",
]

[tool.setuptools.packages.find]
where = [".."]
include = ["cogtrix_byok*"]

[tool.uv]
dev-dependencies = [
    "pytest>=8.0.0",
    "pytest-asyncio>=0.23.0",
]
